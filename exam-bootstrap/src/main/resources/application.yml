server:
  port: 8081
  servlet:
    context-path: /api/v1
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  # 增加最大请求头大小以支持大型JWT token
  max-http-request-header-size: 64KB
  tomcat:
    max-http-header-size: 64KB

spring:
  application:
    name: exam-registration-system
  profiles:
    active: dev

  # 数据库配置
  datasource:
    url: jdbc:postgresql://localhost:5432/duanruo-exam-system
    username: postgres
    password: zww0625wh
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      # 性能优化配置
      leak-detection-threshold: 60000  # 60秒，检测连接泄漏
      connection-test-query: SELECT 1  # 连接测试查询
      pool-name: ExamSystemHikariPool
      auto-commit: true
      validation-timeout: 5000

  # JPA配置
  jpa:
    hibernate:
      ddl-auto: none  # 完全禁用DDL操作（由Flyway管理）
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true
          # 批量操作优化
          batch_size: 50
          batch_versioned_data: true
        format_sql: true
        # 多租户配置（通过HibernateMultiTenancyConfig Java配置注入）
        multitenancy: SCHEMA
        # 批量操作优化
        order_inserts: true
        order_updates: true
        # 缓存配置 - 暂时禁用，需要添加 JCache 依赖
        cache:
          use_second_level_cache: false
          use_query_cache: false
          # region:
          #   factory_class: org.hibernate.cache.jcache.JCacheRegionFactory
        # 统计信息（开发环境启用，生产环境关闭）
        generate_statistics: true
    show-sql: true

  # Jackson配置
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    # LocalDateTime格式化配置
    deserialization:
      adjust-dates-to-context-time-zone: false
    # JSR310模块配置
    default-property-inclusion: non_null

  # HTTP编码配置
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

  # Flyway配置
  flyway:
    enabled: ${FLYWAY_ENABLED:true}  # 可通过环境变量控制
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true  # 暂时禁用验证，允许执行未应用的迁移
    out-of-order: false  # 允许乱序执行迁移脚本
    clean-disabled: true  # 禁用clean操作，防止数据丢失


# 服务器配置已移至顶部

# 管理端点配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# 日志配置
logging:
  level:
    root: INFO
    com.duanruo.exam: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# MinIO配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:exam-uploads}
  presign-expires: 3600 # 1小时

# 文件上传安全配置
exam:
  file:
    max-size: 10485760 # 10MB (字节)
    allowed-types:
      - pdf
      - doc
      - docx
      - xls
      - xlsx
      - jpg
      - jpeg
      - png
      - gif
    enable-magic-number-validation: true
    enable-file-name-validation: true
    enable-content-type-validation: true
    virus-scan:
      enabled: false # 开发环境禁用，生产环境建议启用
      engine: mock # mock | clamav
      clamav-host: localhost
      clamav-port: 3310
      timeout: 30

# 应用自定义配置
app:
  name: "考试报名系统"
  version: "0.0.1-SNAPSHOT"

  # 租户备份配置
  tenant:
    backup:
      base-path: ${BACKUP_BASE_PATH:./backups}  # 备份文件存储路径
      retention-days: ${BACKUP_RETENTION_DAYS:30}  # 备份保留天数
      auto-cleanup:
        enabled: ${BACKUP_AUTO_CLEANUP:true}  # 是否自动清理过期备份
        cron: "0 0 2 * * ?"  # 每天凌晨2点执行清理

  # 安全配置
  security:
    jwt:
      secret: ${JWT_SECRET:exam-registration-jwt-secret-key-change-in-production-64bytes-min}
      expiration: 86400 # 24小时，单位：秒
    bootstrap-token: ${BOOTSTRAP_TOKEN:}
    csrf:
      enabled: false # 禁用CSRF保护，因为使用JWT认证
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:3002,http://127.0.0.1:3002}
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: "*"
      allow-credentials: true
    # API限流配置
    rate-limit:
      enabled: ${RATE_LIMIT_ENABLED:true}
      requests-per-second: ${RATE_LIMIT_RPS:10} # 每秒允许的请求数
      cache-size: 10000 # 限流器缓存大小
      cache-expire-minutes: 10 # 限流器缓存过期时间（分钟）

  # 加密配置
  encryption:
    key: ${ENCRYPTION_KEY:exam-registration-aes-key-change-in-production}
    algorithm: AES/CBC/PKCS5Padding

  # 文件上传配置
  file:
    max-size: 10MB
    allowed-types: pdf,jpg,jpeg,png,doc,docx
    virus-scan:
      enabled: false # 开发环境关闭病毒扫描

  # 业务配置
  business:
    ticket:
      default-prefix: "EXAM"
      sequence-start: 1000
    outbox:
      poll-interval: 2000 # 毫秒
      max-retry: 5
      batch-size: 50
    notification:
      email:
        enabled: true
        from: ${EMAIL_FROM:noreply@exam-system.com}
      sms:
        enabled: false # 开发环境关闭短信
    auto-review:
      enabled: true
      timeout: 30 # 秒

# 定时任务配置
scheduler:
  # 自动座位分配
  autoSeating:
    fixedDelay: 600000  # 10分钟（毫秒）
    initialDelay: 60000 # 1分钟（毫秒）

  # 报名截止自动化
  registrationClosure:
    fixedDelay: 300000  # 5分钟（毫秒）
    initialDelay: 60000 # 1分钟（毫秒）

# 支付配置
payment:
  currency: CNY
  stub-only: ${PAYMENT_STUB_ONLY:true}  # 开发环境默认使用STUB，生产环境设为false

  # 支付宝配置
  alipay:
    enabled: ${ALIPAY_ENABLED:false}
    app-id: ${ALIPAY_APP_ID:}
    private-key: ${ALIPAY_PRIVATE_KEY:}
    public-key: ${ALIPAY_PUBLIC_KEY:}
    gateway-url: ${ALIPAY_GATEWAY_URL:https://openapi.alipay.com/gateway.do}
    notify-url: ${ALIPAY_NOTIFY_URL:}
    return-url: ${ALIPAY_RETURN_URL:}
    sign-type: RSA2
    charset: UTF-8
    format: json

  # 微信支付配置
  wechat:
    enabled: ${WECHAT_ENABLED:false}
    app-id: ${WECHAT_APP_ID:}
    mch-id: ${WECHAT_MCH_ID:}
    api-key: ${WECHAT_API_KEY:}
    api-v3-key: ${WECHAT_API_V3_KEY:}
    cert-path: ${WECHAT_CERT_PATH:}
    notify-url: ${WECHAT_NOTIFY_URL:}
    serial-no: ${WECHAT_SERIAL_NO:}
