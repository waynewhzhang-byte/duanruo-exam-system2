<!DOCTYPE html>
<html>
<head>
    <title>登录助手</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>登录助手</h1>
    <p>正在执行登录...</p>
    <script>
        async function performLogin() {
            try {
                // 1. 调用登录API
                const loginResponse = await fetch('http://localhost:8081/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: 'tenant_admin',
                        password: 'TenantAdmin123!@#'
                    })
                });

                if (!loginResponse.ok) {
                    throw new Error(`Login failed: ${loginResponse.status}`);
                }

                const loginData = await loginResponse.json();
                console.log('Login successful:', loginData);

                // 2. 设置session cookie
                const sessionResponse = await fetch('/api/session', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        token: loginData.token,
                        user: loginData.user
                    }),
                    credentials: 'include'
                });

                if (!sessionResponse.ok) {
                    throw new Error(`Session setup failed: ${sessionResponse.status}`);
                }

                console.log('Session cookie set successfully');

                // 3. 存储到localStorage作为备用
                localStorage.setItem('token', loginData.token);
                localStorage.setItem('user', JSON.stringify(loginData.user));

                console.log('Token stored in localStorage');

                // 4. 获取租户列表并选择test-company-a
                const tenantsResponse = await fetch('http://localhost:8081/api/v1/tenants/me', {
                    headers: {
                        'Authorization': `Bearer ${loginData.token}`
                    }
                });

                if (tenantsResponse.ok) {
                    const tenants = await tenantsResponse.json();
                    console.log('User tenants:', tenants);
                    
                    // 查找test-company-a租户
                    const tenant = tenants.find(t => t.slug === 'test-company-a') || tenants[0];
                    if (tenant) {
                        console.log('Selecting tenant:', tenant);
                        
                        // 选择租户
                        const selectResponse = await fetch('http://localhost:8081/api/v1/auth/select-tenant', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${loginData.token}`
                            },
                            body: JSON.stringify({ tenantId: tenant.id })
                        });

                        if (selectResponse.ok) {
                            const selectData = await selectResponse.json();
                            console.log('Tenant selected:', selectData);
                            
                            // 更新token
                            if (selectData.token) {
                                await fetch('/api/session', {
                                    method: 'POST',
                                    headers: {
                                        'Content-Type': 'application/json',
                                    },
                                    body: JSON.stringify({
                                        token: selectData.token,
                                        user: selectData.user
                                    }),
                                    credentials: 'include'
                                });
                                localStorage.setItem('token', selectData.token);
                                console.log('Updated token after tenant selection');
                            }
                        }
                    }
                }

                // 5. 跳转到管理后台
                document.body.innerHTML = '<h1>登录成功！</h1><p>正在跳转到管理后台...</p>';
                setTimeout(() => {
                    window.location.href = '/test-company-a/admin';
                }, 1000);
                
            } catch (error) {
                console.error('Login error:', error);
                document.body.innerHTML = '<h1>登录失败</h1><p>' + error.message + '</p>';
            }
        }

        // 页面加载后执行登录
        performLogin();
    </script>
</body>
</html>
