name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: '-Xmx1024m'

jobs:
  test:
    name: Test & Quality Check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: exam_registration_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Shallow clones should be disabled for better analysis

    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: maven

    - name: Cache SonarCloud packages
      uses: actions/cache@v3
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: Verify Maven installation
      run: mvn --version

    - name: Run tests
      run: mvn -B -DfailIfNoTests=false clean test
      env:
        SPRING_PROFILES_ACTIVE: test
        DATABASE_URL: jdbc:postgresql://localhost:5432/exam_registration_test
        DATABASE_USERNAME: test_user
        DATABASE_PASSWORD: test_password

    - name: Boot app (test profile) and export OpenAPI spec
      run: |
        mvn -q -pl exam-bootstrap -am -DskipTests spring-boot:run -Dspring-boot.run.profiles=test -Dspring-boot.run.jvmArguments="-Dspring.flyway.enabled=false" &
        sleep 20
        curl -fS http://localhost:8081/api/v1/v3/api-docs > openapi.json
        curl -fS http://localhost:8081/api/v1/v3/api-docs.yaml > openapi.yaml || true
        kill %1 || true
      env:
        SPRING_PROFILES_ACTIVE: test
        JWT_SECRET: ci-jwt-secret-for-test-openapi-validate-this-will-be-derived

    - name: Validate OpenAPI schema with openapi-generator-cli
      run: |
        if command -v openapi-generator-cli >/dev/null 2>&1; then
          openapi-generator-cli validate -i openapi.json
        elif [ -f /usr/local/bin/openapi-generator-cli.jar ]; then
          java -jar /usr/local/bin/openapi-generator-cli.jar validate -i openapi.json
        else
          echo "openapi-generator-cli not available; skipping validation"
        fi
      continue-on-error: true
    - name: OpenAPI diff against baseline
      run: |
        if [ -f api-contracts/openapi-baseline.json ]; then
          echo "Comparing current OpenAPI with baseline..."
          docker run --rm -v "$PWD":/work openapitools/openapi-diff:2.1.0 \
            --fail-on-incompatible /work/api-contracts/openapi-baseline.json /work/openapi.json
        else
          echo "No baseline found at api-contracts/openapi-baseline.json; creating baseline from current spec"
          mkdir -p api-contracts
          cp openapi.json api-contracts/openapi-baseline.json
          echo "::warning::OpenAPI baseline created. Commit api-contracts/openapi-baseline.json to enable diff gate in future runs."
        fi
    - name: Upload OpenAPI artifacts
      uses: actions/upload-artifact@v3
      with:
        name: openapi-spec
        path: |
          openapi.json
          openapi.yaml
          api-contracts/openapi-baseline.json

    - name: Generate test report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: Maven Tests
        path: '**/target/surefire-reports/*.xml'
        reporter: java-junit

    - name: Run Checkstyle
      run: mvn checkstyle:check
      continue-on-error: true

    - name: Run SpotBugs
      run: mvn spotbugs:check
      continue-on-error: true

    - name: Run PMD
      run: mvn pmd:check
      continue-on-error: true

    - name: Analyze with SonarCloud
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        if [ -n "$SONAR_TOKEN" ]; then
          mvn sonar:sonar \
            -Dsonar.projectKey=duanruo-exam-system \
            -Dsonar.organization=duanruo \
            -Dsonar.host.url=https://sonarcloud.io
        else
          echo "SonarCloud analysis skipped - SONAR_TOKEN not available"
        fi
      continue-on-error: true

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./target/site/jacoco/jacoco.xml
        flags: unittests
        name: codecov-umbrella
      continue-on-error: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: maven

    - name: Run OWASP Dependency Check
      run: mvn org.owasp:dependency-check-maven:check
      continue-on-error: true

    - name: Upload OWASP report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: owasp-report
        path: target/dependency-check-report.html

    - name: Run Snyk security scan
      uses: snyk/actions/maven@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high
      continue-on-error: true

  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: maven

    - name: Build application
      run: mvn clean package -DskipTests

    - name: Build Docker image
      run: |
        docker build -t exam-registration:${{ github.sha }} .
        docker tag exam-registration:${{ github.sha }} exam-registration:latest

    - name: Save Docker image
      run: docker save exam-registration:latest | gzip > exam-registration.tar.gz

    - name: Upload Docker image artifact
      uses: actions/upload-artifact@v3
      with:
        name: docker-image
        path: exam-registration.tar.gz
        retention-days: 7

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Docker image
      uses: actions/download-artifact@v3
      with:
        name: docker-image

    - name: Load Docker image
      run: docker load < exam-registration.tar.gz

    - name: Deploy to staging
      run: |
        echo "Deploying to staging environment..."
        # Add your staging deployment commands here
        # Example: kubectl apply -f k8s/staging/

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Docker image
      uses: actions/download-artifact@v3
      with:
        name: docker-image

    - name: Load Docker image
      run: docker load < exam-registration.tar.gz

    - name: Deploy to production
      run: |
        echo "Deploying to production environment..."
        # Add your production deployment commands here
        # Example: kubectl apply -f k8s/production/
