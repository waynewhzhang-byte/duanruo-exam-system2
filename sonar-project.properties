# SonarQube project configuration
sonar.projectKey=duanruo-exam-system
sonar.projectName=Exam Registration System
sonar.projectVersion=0.0.1-SNAPSHOT

# Source and test directories
sonar.sources=exam-shared/src/main/java,exam-domain/src/main/java,exam-application/src/main/java,exam-infrastructure/src/main/java,exam-adapter-rest/src/main/java,exam-adapter-scheduler/src/main/java,exam-bootstrap/src/main/java
sonar.tests=exam-shared/src/test/java,exam-domain/src/test/java,exam-application/src/test/java,exam-infrastructure/src/test/java,exam-adapter-rest/src/test/java,exam-adapter-scheduler/src/test/java,exam-bootstrap/src/test/java

# Java version
sonar.java.source=21
sonar.java.target=21
# Binaries (for non-Maven CLI or IDE analyzers)
sonar.java.binaries=exam-shared/target/classes,exam-domain/target/classes,exam-application/target/classes,exam-infrastructure/target/classes,exam-adapter-rest/target/classes,exam-adapter-scheduler/target/classes,exam-bootstrap/target/classes
sonar.java.test.binaries=exam-shared/target/test-classes,exam-domain/target/test-classes,exam-application/target/test-classes,exam-infrastructure/target/test-classes,exam-adapter-rest/target/test-classes,exam-adapter-scheduler/target/test-classes,exam-bootstrap/target/test-classes

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage reports
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.junit.reportPaths=target/surefire-reports

# Exclude generated code
sonar.exclusions=**/target/**,**/*Impl.java,**/*MapperImpl.java,**/generated-sources/**

# Test exclusions
sonar.test.exclusions=**/*Test.java,**/*Tests.java,**/*IT.java

# Coverage exclusions (exclude from coverage calculation)
sonar.coverage.exclusions=**/config/**,**/configuration/**,**/*Config.java,**/*Configuration.java,**/Application.java,**/dto/**,**/entity/**

# Duplication exclusions
sonar.cpd.exclusions=**/dto/**,**/entity/**,**/exception/**

# Quality gate
sonar.qualitygate.wait=true

# Analysis parameters (default)
# sonar.analysis.mode is deprecated and removed

# Issue exclusions
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5

# Exclude "Tests should include assertions" for integration tests
sonar.issue.ignore.multicriteria.e1.ruleKey=java:S2699
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*IT.java

# Exclude "Utility classes should not have public constructors" for Spring Boot main class
sonar.issue.ignore.multicriteria.e2.ruleKey=java:S1118
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*Application.java

# Exclude "Fields in a "Serializable" class should either be transient or serializable" for JPA entities
sonar.issue.ignore.multicriteria.e3.ruleKey=java:S1948
sonar.issue.ignore.multicriteria.e3.resourceKey=**/infrastructure/**/*Entity.java

# Exclude "Cognitive Complexity" for complex domain logic
sonar.issue.ignore.multicriteria.e4.ruleKey=java:S3776
sonar.issue.ignore.multicriteria.e4.resourceKey=**/domain/**/*.java

# Exclude "Public constants and fields initialized at declaration should be "static final"" for JPA entities
sonar.issue.ignore.multicriteria.e5.ruleKey=java:S1444
sonar.issue.ignore.multicriteria.e5.resourceKey=**/infrastructure/**/*Entity.java
