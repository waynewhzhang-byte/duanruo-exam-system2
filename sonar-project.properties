# SonarQube 项目质量分析配置（仅连接本地 SonarQube）
# 端若数智考盟 - 多模块 (server + web)
# 运行前请先启动本地 SonarQube，并设置环境变量: SONAR_TOKEN
# 可选覆盖地址: -Dsonar.host.url=http://其他地址:9000

sonar.host.url=http://localhost:9000
sonar.projectKey=duanruo-exam-system
sonar.projectName=端若数智考盟

# 源码目录 (NestJS 后端 + Next.js 前端)
sonar.sources=server/src,web/src

# 测试代码参与分析 (重复率、可维护性)，与 sonar.sources 同根目录时用 inclusions 即可
sonar.test.inclusions=**/*.spec.ts,**/*.spec.tsx,**/*.test.ts,**/*.test.tsx,**/test/**/*,**/tests/**/*

# 排除无需分析的目录与文件
sonar.exclusions=\
**/node_modules/**,\
**/dist/**,\
**/.next/**,\
**/coverage/**,\
**/*.min.js,\
**/openapi/**,\
**/scripts/**,\
**/*.d.ts,\
**/jest.config.*,\
**/cucumber*.js,\
**/next.config.js

# 覆盖率报告 (可选，需先执行 server 的 test:cov)
sonar.javascript.lcov.reportPaths=server/coverage/lcov.info

# TypeScript
sonar.typescript.node.maxSpaceForWorkspace=4096

# 编码
sonar.sourceEncoding=UTF-8
